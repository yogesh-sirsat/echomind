name: Release EchoMind

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true # Enables automatic caching of Go modules and build cache

      - name: Install ALSA (Fast)
        # We skip 'apt-get update' because the ubuntu-latest image is usually up to date
        run: sudo apt-get install -y libasound2-dev

      - name: Run GoReleaser (Snapshot on Main, Release on Tag)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          # Use 'release' for tags, 'snapshot' for main branch to test the build
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'build --snapshot --clean --single-target' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
