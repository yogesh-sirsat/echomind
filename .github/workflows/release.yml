name: Release EchoMind

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser (cross build image)
        run: |
          ARGS="build --snapshot --clean"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ARGS="release --clean"
          fi

          docker run --rm \
            -e GITHUB_TOKEN \
            -e GORELEASER_CURRENT_TAG="${GITHUB_REF_NAME}" \
            -v "${PWD}":/workspace \
            -w /workspace \
            ghcr.io/goreleaser/goreleaser-cross:v2 \
            goreleaser ${ARGS}
