# GoReleaser configuration for EchoMind CLI
version: 2
project_name: echomind

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: echomind-windows
    main: ./main.go
    binary: echomind
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: yogesh-sirsat
    name: echomind
  draft: false
  replace_existing_draft: true
  prerelease: auto