# GoReleaser configuration for EchoMind CLI
version: 2
project_name: echomind

before:
  hooks:
    - go mod tidy

builds:
  - id: echomind
    main: ./main.go
    binary: echomind
    env:
      - CGO_ENABLED=1
      # We use zig cc for cross-compilation of CGO
      - CC=zig cc
      - CXX=zig c++
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Set the zig targets for each OS/Arch
    targets:
      - linux_amd64_v1
      - linux_arm64
      - windows_amd64_v1
      - windows_arm64
      - darwin_amd64_v1
      - darwin_arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    flags:
      - -mod=readonly

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc

release:
  github:
    owner: yogesh-sirsat
    name: echomind
  draft: false
  replace_existing_draft: true
  prerelease: auto

brews:
  - name: echomind
    repository:
      owner: yogesh-sirsat
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/yogesh-sirsat/echomind"
    description: "A colorful and interactive voice-recording CLI tool"
    license: "MIT"
    test: |
      system "#{bin}/echomind --help"
    install: |
      bin.install "echomind"
