# GoReleaser configuration for EchoMind CLI
version: 2
project_name: echomind

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: echomind-windows
    main: ./main.go
    binary: echomind
    env:
      - CGO_ENABLED=1
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  # NOTE: Linux and Darwin builds are commented out because they require a cross-compiler 
  # (like x86_64-linux-gnu-gcc) to build from Windows due to CGO dependencies in malgo.
  # If you want to build for these, it is recommended to run Goreleaser in a 
  # GitHub Action using a Linux runner.
  
  # - id: echomind-unix
  #   main: ./main.go
  #   binary: echomind
  #   env:
  #     - CGO_ENABLED=1
  #   goos:
  #     - linux
  #     - darwin
  #   goarch:
  #     - amd64
  #     - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: yogesh-sirsat
    name: echomind
  draft: false
  replace_existing_draft: true
  prerelease: auto
