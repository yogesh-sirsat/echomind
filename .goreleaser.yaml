# GoReleaser configuration for EchoMind CLI
version: 2
project_name: echomind

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...

builds:
  - id: echomind
    main: ./main.go
    binary: echomind
    env:
      - CGO_ENABLED=1
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    # Note: Cross-compiling CGO requires a cross-compiler (e.g. zig cc or x86_64-w64-mingw32-gcc)
    # This setup assumes the environment has the necessary compilers or is running in a specialized CI.

archives:
- formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
  name_template: >-
    {{ .ProjectName }}_
    {{- title .Os }}_
    {{- if eq .Arch "amd64" }}x86_64
    {{- else if eq .Arch "386" }}i386
    {{- else }}{{ .Arch }}{{ end }}
    {{- if .Arm }}v{{ .Arm }}{{ end }}
  format_overrides:
    - goos: windows
      formats: [zip]
  files:
    - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: yogesh-sirsat
    name: echomind
  draft: false
  replace_existing_draft: true
  prerelease: auto
