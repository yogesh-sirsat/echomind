# GoReleaser configuration for EchoMind CLI
version: 2
project_name: echomind

builds:
  - id: echomind
    main: ./main.go
    binary: echomind
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X echomind/cmd.version={{.Version}} -X echomind/cmd.commit={{.Commit}} -X echomind/cmd.date={{.Date}}
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++
      - goos: windows
        goarch: amd64
        env:
          - CC=x86_64-w64-mingw32-gcc
          - CXX=x86_64-w64-mingw32-g++

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc

release:
  github:
    owner: yogesh-sirsat
    name: echomind
  draft: false
  replace_existing_draft: true
  prerelease: auto

brews:
  - name: echomind
    repository:
      owner: yogesh-sirsat
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/yogesh-sirsat/echomind
    description: A colorful and interactive voice-recording CLI tool
    license: MIT
    test: |
      system "#{bin}/echomind --help"
    install: |
      bin.install "echomind"
